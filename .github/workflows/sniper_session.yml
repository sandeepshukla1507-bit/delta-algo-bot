name: Trading Session Sniper

on:
  schedule:
    # यह हर रोज शाम 6:30 PM IST (13:00 UTC) पर अपने आप शुरू होगा
    - cron: '0 13 * * *' 
  workflow_dispatch: # इसे आप मैन्युअली भी बटन दबाकर चला सकते हैं

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install ccxt pandas

      - name: Run Sniper Bot
        env:
          DELTA_API_KEY: ${{ secrets.DELTA_API_KEY }}
          DELTA_API_SECRET: ${{ secrets.DELTA_API_SECRET }}
        run: python main.py
